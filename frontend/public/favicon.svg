<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Fondo negro redondeado -->
  <rect width="100" height="100" rx="22" ry="22" fill="#0a0a0b"/>

  <!-- Marco exterior (vault) -->
  <rect x="8" y="8" width="84" height="84" rx="16" ry="16"
        fill="none" stroke="url(#grad)" stroke-width="4"/>

  <!-- Marco interior -->
  <rect x="15" y="15" width="70" height="70" rx="12" ry="12"
        fill="none" stroke="url(#grad)" stroke-width="2.5" opacity="0.6"/>

  <!-- Bisagras del vault (izquierda) -->
  <rect x="4" y="28" width="8" height="6" rx="2" fill="url(#grad)"/>
  <rect x="4" y="66" width="8" height="6" rx="2" fill="url(#grad)"/>

  <!-- Manivela del vault (derecha) -->
  <circle cx="89" cy="50" r="5" fill="none" stroke="url(#grad)" stroke-width="2.5"/>
  <line x1="89" y1="45" x2="89" y2="42" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cuerpo del mando -->
  <path d="M31 44 Q31 38 38 38 L62 38 Q69 38 69 44 L69 56 Q69 64 62 64 Q57 64 54 60 L46 60 Q43 64 38 64 Q31 64 31 56 Z"
        fill="url(#grad)"/>

  <!-- D-pad (izquierda) -->
  <rect x="37" y="47" width="4" height="10" rx="1" fill="#0a0a0b"/>
  <rect x="34" y="50" width="10" height="4" rx="1" fill="#0a0a0b"/>

  <!-- Botones (derecha) -->
  <circle cx="59" cy="48" r="2.2" fill="#0a0a0b"/>
  <circle cx="63" cy="52" r="2.2" fill="#0a0a0b"/>
  <circle cx="55" cy="52" r="2.2" fill="#0a0a0b"/>
  <circle cx="59" cy="56" r="2.2" fill="#0a0a0b"/>

  <!-- Joysticks -->
  <circle cx="42" cy="56" r="3.5" fill="#5b21b6"/>
  <circle cx="58" cy="43" r="3.5" fill="#5b21b6"/>
</svg>
